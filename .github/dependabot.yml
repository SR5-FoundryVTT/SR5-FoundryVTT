version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    groups:
      fvtt-types:
        patterns:
          - "fvtt-types"

      everything:
        patterns:
          - "*"
        exclude-patterns:
          - "fvtt-types"

    labels:
      - "dependencies"

    ignore:
      - dependency-name: "@types/node"
